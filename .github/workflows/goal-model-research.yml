name: Goal model research

on:
  push:
    branches: [feat/independent-goal-model]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[all]" pytest
      - run: python scripts/audit_goal_model_data.py
      - run: pytest -q tests/test_goal_model.py
      - run: pytest -q
